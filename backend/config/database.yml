default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST", "127.0.0.1") %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "postgres") %>

development:
  <<: *default
  database: fourmm_development

test:
  <<: *default
  database: fourmm_test

production:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "fourmm_production") %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "fourmm") %>
  password: <%= ENV["DATABASE_PASSWORD"] %>
  host: <%= ENV.fetch("DATABASE_HOST", "127.0.0.1") %>
