# Example: TLS terminates here, static Vite build + Rails API on the same site (cookie sessions, no CORS).
# Adjust paths, server_name, and upstream ports for your VPS.

upstream fourmm_api {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 443 ssl http2;
  server_name your-domain.example;

  # ssl_certificate /path/to/fullchain.pem;
  # ssl_certificate_key /path/to/privkey.pem;

  root /var/www/fourmm/dist;
  index index.html;

  # Same-origin API — preserve the /api prefix when proxying to Puma.
  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Connection "";
    proxy_read_timeout 60s;
    proxy_pass http://fourmm_api;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
